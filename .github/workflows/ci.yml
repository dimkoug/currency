name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: currency
          POSTGRES_USER: currency
          POSTGRES_PASSWORD: currency
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U currency"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      SECRET_KEY: ci-secret
      DEBUG: "false"
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: currency
      POSTGRES_USER: currency
      POSTGRES_PASSWORD: currency
      REDIS_URL: redis://localhost:6379/0
      DB_DISABLE_SERVER_SIDE_CURSORS: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Run tests
        working-directory: backend
        run: pytest -q

  frontend:
    name: Frontend (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Run unit tests
        working-directory: frontend
        run: npm test

  e2e:
    name: E2E (compose smoke + Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Create .env
        run: cp .env.sample .env

      - name: Build & start the stack
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --build

      - name: Wait for live rates to populate
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/rates/latest/ | grep -q '"USD"'; then
              echo "rates populated"; exit 0
            fi
            sleep 5
          done
          echo "::error::rates did not populate"; docker compose logs --tail=80; exit 1

      - name: Smoke test (REST + Varnish cache + WebSocket)
        run: node e2e/smoke.mjs
        env:
          BASE_URL: http://localhost:8080

      - name: Playwright browser test
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npx playwright test
        env:
          BASE_URL: http://localhost:8080
          CI: "true"

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail=120

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v
