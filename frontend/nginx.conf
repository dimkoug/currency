# Docker's embedded DNS — lets us re-resolve service names at request time so
# traffic load-balances across backend replicas (round-robin A records).
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets: served directly, cached immutably by the browser.
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Websockets go STRAIGHT to the backend (bypassing Varnish, which would pipe
    # them thread-per-connection). Load-balanced across backend replicas.
    location /ws/ {
        set $ws_backend backend;
        proxy_pass http://$ws_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Public read-only API: served through the Varnish micro-cache.
    location /api/ {
        set $api_cache varnish;
        proxy_pass http://$api_cache:80;
        proxy_set_header Host $host;
    }

    # Internal origin that Varnish fetches on a cache miss. Mapped back to /api/
    # and load-balanced across backend replicas. (Not intended for direct use;
    # hitting it just bypasses the cache and returns the same public data.)
    location /_origin_api/ {
        set $api_backend backend;
        rewrite ^/_origin_api/(.*)$ /api/$1 break;
        proxy_pass http://$api_backend:8000;
        proxy_set_header Host $host;
    }

    # SPA shell — never cached so new build hashes are always picked up.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
